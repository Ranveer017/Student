<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=Geist:wght@300;400;500&display=swap"
    rel="stylesheet" />

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #080808;
      font-family: 'Geist', 'Segoe UI', sans-serif;
      color: #e2e2e2;
      min-height: 100vh;
    }

    /* ══ LOGIN ══ */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #080808;
      background-image:
        radial-gradient(ellipse 60% 50% at 60% 20%, #1a1035 0%, transparent 65%),
        radial-gradient(ellipse 40% 40% at 20% 80%, #0a1f15 0%, transparent 60%);
    }

    .login-box {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 24px;
      padding: 2.5rem 2.25rem;
      width: 100%;
      max-width: 400px;
      text-align: center;
      animation: fadeUp .5s ease forwards;
    }

    .login-logo {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #a78bfa44, #34d39944);
      border: 2px solid #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: #f5f5f5;
      margin: 0 auto 1.25rem;
      overflow: hidden;
    }

    .login-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .login-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      color: #f5f5f5;
      margin-bottom: .4rem;
    }

    .login-sub {
      font-size: .82rem;
      color: #555;
      line-height: 1.65;
      margin-bottom: 1.75rem;
    }

    .login-rule {
      font-family: 'DM Mono', monospace;
      font-size: .62rem;
      color: #333;
      letter-spacing: .1em;
      margin-bottom: 1.25rem;
    }

    .btn-g {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .75rem;
      width: 100%;
      padding: .75rem 1rem;
      background: #f5f5f5;
      color: #111;
      border: none;
      border-radius: 12px;
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .15s;
    }

    .btn-g:hover {
      background: #e8e8e8;
      transform: scale(1.02);
    }

    .login-note {
      margin-top: 1.25rem;
      font-family: 'DM Mono', monospace;
      font-size: .62rem;
      color: #333;
      line-height: 1.7;
    }

    /* ══ ADMIN BAR ══ */
    #admin-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #0c0c0cee;
      border-bottom: 1px solid #1a1a1a;
      padding: .6rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      backdrop-filter: blur(12px);
    }

    .ab-left {
      display: flex;
      align-items: center;
      gap: .6rem;
    }

    .ab-right {
      display: flex;
      align-items: center;
      gap: .5rem;
      flex-wrap: wrap;
    }

    .ab-img {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid #2a2a2a;
      object-fit: cover;
    }

    .ab-name {
      font-family: 'DM Mono', monospace;
      font-size: .76rem;
      color: #aaa;
    }

    .ab-pill {
      font-family: 'DM Mono', monospace;
      font-size: .6rem;
      padding: .15rem .5rem;
      border-radius: 99px;
    }

    .ab-admin {
      background: #0d2015;
      border: 1px solid #34d39922;
      color: #34d399;
    }

    .ab-viewer {
      background: #1a1010;
      border: 1px solid #ff444422;
      color: #f87171;
    }

    .ab-btn {
      padding: .4rem .9rem;
      border-radius: 8px;
      border: none;
      font-size: .75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }

    .ab-edit {
      background: #1a1a2e;
      color: #a78bfa;
      border: 1px solid #a78bfa33;
    }

    .ab-edit:hover {
      background: #252540;
    }

    .ab-save {
      background: #0d2015;
      color: #34d399;
      border: 1px solid #34d39933;
    }

    .ab-save:hover {
      background: #142b1f;
    }

    .ab-cancel {
      background: #1e1010;
      color: #f87171;
      border: 1px solid #f8717133;
    }

    .ab-cancel:hover {
      background: #2a1414;
    }

    .ab-reset {
      background: #2a0e00;
      color: #fb923c;
      border: 1px solid #fb923c44;
    }

    .ab-reset:hover {
      background: #3a1500;
      border-color: #fb923c88;
    }

    .ab-out {
      background: #1a1a1a;
      color: #666;
      border: 1px solid #252525;
    }

    .ab-out:hover {
      color: #ccc;
      border-color: #333;
    }

    /* ══ PORTFOLIO ROOT ══ */
    .p-root {
      min-height: 100vh;
      background: #080808;
      background-image:
        radial-gradient(ellipse 60% 40% at 70% 10%, #1a1035 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 10% 80%, #0a1f15 0%, transparent 60%);
      padding: 2rem 1rem 3rem;
    }

    .grid {
      max-width: 1080px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: .875rem;
    }

    /* ══ CARDS ══ */
    .card {
      background: #111111;
      border: 1px solid #1e1e1e;
      border-radius: 20px;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
      transition: border-color .25s, transform .25s;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp .55s ease forwards;
    }

    .card:hover {
      border-color: #2e2e2e;
      transform: translateY(-2px);
    }

    .card.editing {
      border-color: #a78bfa44 !important;
      box-shadow: 0 0 0 1px #a78bfa1a;
    }

    .c-hero     { grid-column: span 7; min-height: 230px; }
    .c-avatar   { grid-column: span 5; min-height: 230px; }
    .c-stats    { grid-column: span 4; }
    .c-tools    { grid-column: span 8; }
    .c-exp      { grid-column: span 12; }
    .c-projects { grid-column: span 7; }
    .c-contact  { grid-column: span 5; }
    .c-reviews  { grid-column: span 12; }

    .card:nth-child(1)  { animation-delay: 0ms   }
    .card:nth-child(2)  { animation-delay: 70ms  }
    .card:nth-child(3)  { animation-delay: 140ms }
    .card:nth-child(4)  { animation-delay: 210ms }
    .card:nth-child(5)  { animation-delay: 280ms }
    .card:nth-child(6)  { animation-delay: 350ms }
    .card:nth-child(7)  { animation-delay: 420ms }
    .card:nth-child(8)  { animation-delay: 490ms }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0) }
    }

    .glow {
      position: absolute;
      width: 130px;
      height: 130px;
      border-radius: 50%;
      filter: blur(65px);
      pointer-events: none;
      opacity: .15;
    }

    /* ── labels ── */
    .lbl {
      font-family: 'DM Mono', monospace;
      font-size: .65rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 1rem;
    }

    .sec {
      font-family: 'Syne', sans-serif;
      font-size: .85rem;
      font-weight: 700;
      color: #d0d0d0;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    /* ── avail badge ── */
    .avail {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .3rem .75rem;
      background: #0d2015;
      border: 1px solid #34d39922;
      border-radius: 99px;
      font-family: 'DM Mono', monospace;
      font-size: .65rem;
      color: #34d399;
      margin-bottom: 1rem;
    }

    .blink {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #34d399;
      box-shadow: 0 0 5px #34d399;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1  }
      50%       { opacity: .4 }
    }

    /* ── hero ── */
    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: .7rem;
      color: #34d399;
      letter-spacing: .15em;
      text-transform: uppercase;
      margin-bottom: .6rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    .eyebrow::before {
      content: '';
      width: 22px;
      height: 1px;
      background: #34d399;
    }

    .heroname {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -.03em;
      color: #f5f5f5;
      margin-bottom: .75rem;
    }

    .heroname span {
      background: linear-gradient(135deg, #a78bfa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .herosub {
      font-size: .92rem;
      color: #888;
      line-height: 1.65;
      max-width: 360px;
      margin-bottom: 1.25rem;
    }

    .actions {
      display: flex;
      gap: .6rem;
      flex-wrap: wrap;
    }

    /* ══ CLICK ANIMATIONS (Feature 3) ══ */
    /* btn-p: white button — glow on active */
    .btn-p {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .5rem 1rem;
      background: #f5f5f5;
      color: #080808;
      border-radius: 10px;
      font-size: .8rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: background .2s, transform .15s, box-shadow .15s;
    }

    .btn-p:hover {
      background: #e0e0e0;
      transform: scale(1.03);
    }

    .btn-p:active {
      transform: scale(0.95);
      box-shadow: 0 0 18px 4px #f5f5f566, 0 0 6px 1px #ffffff88;
      background: #ffffff;
      animation: pop-white .35s ease forwards;
    }

    @keyframes pop-white {
      0%   { box-shadow: 0 0 18px 4px #f5f5f566; }
      60%  { box-shadow: 0 0 28px 8px #f5f5f533; }
      100% { box-shadow: 0 0 0px 0px transparent; }
    }

    /* btn-gh: ghost button — violet glow on active */
    .btn-gh {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .5rem 1rem;
      background: transparent;
      color: #aaa;
      border-radius: 10px;
      font-size: .8rem;
      font-weight: 500;
      border: 1px solid #2a2a2a;
      cursor: pointer;
      text-decoration: none;
      transition: border-color .2s, color .2s, transform .15s, box-shadow .15s;
    }

    .btn-gh:hover {
      border-color: #444;
      color: #e0e0e0;
      transform: scale(1.03);
    }

    .btn-gh:active {
      transform: scale(0.95);
      box-shadow: 0 0 18px 4px #a78bfa55, 0 0 6px 1px #a78bfa44;
      border-color: #a78bfa88;
      animation: pop-violet .35s ease forwards;
    }

    @keyframes pop-violet {
      0%   { box-shadow: 0 0 18px 4px #a78bfa55; }
      60%  { box-shadow: 0 0 28px 8px #a78bfa33; }
      100% { box-shadow: 0 0 0px 0px transparent; }
    }

    /* soc-btn: social icon — green glow on active */
    .soc-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: #1a1a1a;
      border: 1px solid #252525;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      cursor: pointer;
      text-decoration: none;
      transition: background .2s, color .2s, border-color .2s, transform .15s, box-shadow .15s;
    }

    .soc-btn:hover {
      background: #242424;
      color: #e0e0e0;
      border-color: #333;
    }

    .soc-btn:active {
      transform: scale(0.92);
      box-shadow: 0 0 14px 4px #34d39944;
      border-color: #34d39966;
      animation: pop-green .35s ease forwards;
    }

    @keyframes pop-green {
      0%   { box-shadow: 0 0 14px 4px #34d39944; }
      60%  { box-shadow: 0 0 22px 6px #34d39922; }
      100% { box-shadow: 0 0 0px 0px transparent; }
    }

    .soc-btn svg {
      width: 15px;
      height: 15px;
    }

    /* clink: contact row link — cyan glow on active */
    .clink {
      display: flex;
      align-items: center;
      gap: .5rem;
      padding: .65rem .9rem;
      background: #141414;
      border: 1px solid #1e1e1e;
      border-radius: 12px;
      color: #aaa;
      font-size: .78rem;
      text-decoration: none;
      margin-bottom: .5rem;
      transition: border-color .2s, color .2s, background .2s, transform .15s, box-shadow .15s;
    }

    .clink:hover {
      border-color: #2e2e2e;
      color: #e0e0e0;
      background: #181818;
    }

    .clink:active {
      transform: scale(0.97);
      box-shadow: 0 0 14px 4px #38bdf844;
      border-color: #38bdf866;
      animation: pop-cyan .35s ease forwards;
    }

    @keyframes pop-cyan {
      0%   { box-shadow: 0 0 14px 4px #38bdf844; }
      60%  { box-shadow: 0 0 22px 6px #38bdf822; }
      100% { box-shadow: 0 0 0px 0px transparent; }
    }

    .clink-val {
      margin-left: auto;
      font-family: 'DM Mono', monospace;
      font-size: .65rem;
      color: #444;
    }

    .clink svg {
      width: 13px;
      height: 13px;
      flex-shrink: 0;
    }

    /* ── avatar ── */
    .av-ring {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, #a78bfa44, #34d39944);
      border: 2px solid #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      color: #f5f5f5;
      margin-bottom: 1rem;
      position: relative;
      flex-shrink: 0;
      overflow: hidden;
    }

    /* Feature 2: Profile picture image inside av-ring */
    .av-ring img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
    }

    /* Avatar picture + placeholder positioning helpers (used by #profile-pic) */
    .absolute {
      position: absolute;
    }

    .inset-0 {
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
    }

    .w-full {
      width: 100%;
    }

    .h-full {
      height: 100%;
    }

    .object-cover {
      object-fit: cover;
    }

    .rounded-full {
      border-radius: 9999px;
    }

    #profile-pic {
      display: none; /* toggled by JS */
      z-index: 1;
    }

    .profile-placeholder {
      position: absolute;
      inset: 0;
      display: none; /* toggled by JS */
      align-items: center;
      justify-content: center;
      z-index: 0;
      color: #666;
      pointer-events: none;
    }

    #c-av-init {
      position: absolute;
      inset: 0;
      display: none; /* toggled by JS in edit mode */
      align-items: center;
      justify-content: center;
      z-index: 3;
      padding: 0 10px;
      pointer-events: auto; /* allow admin input interaction */
    }

    .av-online {
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #34d399;
      border: 2px solid #111;
      box-shadow: 0 0 6px #34d39988;
      z-index: 2;
    }

    .av-name {
      font-family: 'Syne', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: #f5f5f5;
      margin-bottom: .2rem;
    }

    .av-role {
      font-size: .77rem;
      color: #666;
      margin-bottom: .85rem;
    }

    .av-meta {
      display: flex;
      align-items: center;
      gap: .4rem;
      font-size: .74rem;
      color: #555;
      margin-bottom: .35rem;
    }

    .soc-row {
      display: flex;
      gap: .5rem;
      margin-top: 1rem;
    }

    /* ── stats ── */
    .sg {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .6rem;
    }

    .sp {
      background: #161616;
      border: 1px solid #1e1e1e;
      border-radius: 12px;
      padding: .75rem;
      display: flex;
      flex-direction: column;
      gap: .2rem;
    }

    .sv {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      line-height: 1;
    }

    .sl {
      font-size: .67rem;
      color: #555;
      font-family: 'DM Mono', monospace;
    }

    /* ── tools ── */
    .tw {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      margin-top: .25rem;
    }

    .tb {
      display: flex;
      align-items: center;
      gap: .5rem;
      padding: .35rem .75rem .35rem .4rem;
      border-radius: 9px;
      cursor: default;
      opacity: 0;
      animation: fadeUp .4s ease forwards;
      transition: transform .2s;
    }

    .tb:hover {
      transform: translateY(-2px) scale(1.04);
    }

    .ti {
      font-family: 'DM Mono', monospace;
      font-size: .62rem;
      font-weight: 500;
      width: 26px;
      height: 22px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff0a;
      flex-shrink: 0;
    }

    .tn {
      font-size: .75rem;
      color: #ccc;
      font-weight: 500;
    }

    /* ── experience ── */
    .exp-item {
      display: grid;
      grid-template-columns: 22px 1fr;
      gap: 0 1rem;
      padding: 1rem .5rem;
      border-bottom: 1px solid #161616;
      cursor: pointer;
      border-radius: 8px;
      transition: background .2s;
    }

    .exp-item:last-child {
      border-bottom: none;
    }

    .exp-item.active {
      background: #141414;
    }

    .exp-dot-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 4px;
    }

    .exp-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 2px solid;
      flex-shrink: 0;
      transition: box-shadow .3s, background .3s;
    }

    .exp-line {
      flex: 1;
      width: 1px;
      background: #1e1e1e;
      margin-top: 4px;
    }

    .exp-period {
      font-family: 'DM Mono', monospace;
      font-size: .64rem;
      color: #444;
      margin-bottom: .25rem;
    }

    .exp-role {
      font-family: 'Syne', sans-serif;
      font-size: .9rem;
      font-weight: 700;
      color: #e0e0e0;
      margin-bottom: .12rem;
    }

    .exp-co {
      font-size: .77rem;
      color: #666;
      margin-bottom: .35rem;
    }

    .exp-desc {
      font-size: .77rem;
      color: #888;
      line-height: 1.6;
      max-height: 0;
      overflow: hidden;
      transition: max-height .35s ease;
    }

    .exp-desc.open {
      max-height: 200px;
    }

    /* ── projects ── */
    .proj-list {
      display: flex;
      flex-direction: column;
      gap: .6rem;
    }

    .proj-card {
      background: #141414;
      border: 1px solid #1e1e1e;
      border-radius: 14px;
      padding: 1rem;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: border-color .2s, transform .2s;
    }

    .proj-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
      background: var(--pc);
      border-radius: 14px 0 0 14px;
      opacity: 0;
      transition: opacity .2s;
    }

    .proj-card:hover {
      border-color: #2e2e2e;
      transform: translateX(3px);
    }

    .proj-card:hover::after {
      opacity: 1;
    }

    .proj-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: .35rem;
    }

    .proj-name {
      font-family: 'Syne', sans-serif;
      font-size: .9rem;
      font-weight: 700;
    }

    .proj-stars {

    }

    .proj-desc {
      font-size: .76rem;
      color: #777;
      line-height: 1.55;
      margin-bottom: .6rem;
    }

    .proj-tags {
      display: flex;
      gap: .35rem;
      flex-wrap: wrap;
    }

    .proj-tag {
      font-family: 'DM Mono', monospace;
      font-size: .6rem;
      padding: .2rem .5rem;

      border: 1px solid #252525;
      color: #666;

    .edu-item {
      display: flex;
      gap: .75rem;
      padding: .75rem;
      background: #141414;
      border-radius: 12px;
      border: 1px solid #1a1a1a;
      margin-top: .5rem;
      transition: border-color .2s;

    .edu-item:hover {
      border-color: #252525;

    .edu-icon {

      height: 36px;
      border-radius: 9px;

      align-items: center;

    .edu-year {

      font-size: .62rem;
      color: #444;
      margin-top: .2rem;
    }

      background: #0d0d0d;
      border: 1px solid #a78bfa55;
      border-radius: 6px;
      padding: .3rem .5rem;
      color: #e0e0e0;
      font-family: inherit;
      font-size: inherit;
      width: 100%;
      outline: none;
      transition: border-color .2s;
      display: block;
      margin-top: 2px;

    .ef:focus {

      min-height: 56px;
